<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>N&G Express - Atendimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 100vh;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header estilo WhatsApp */
        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-info {
            flex: 1;
        }

        .header-info h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-info p {
            margin: 2px 0 0;
            font-size: 0.7rem;
            opacity: 0.9;
        }

        .online-status {
            font-size: 0.7rem;
            background: #4caf50;
            padding: 3px 8px;
            border-radius: 20px;
        }

        /* Área de Mensagens */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" opacity="0.05"><path fill="%23000" d="M0,0L1000,0L1000,1000L0,1000L0,0Z M500,500L800,200L200,200L500,500Z"/></svg>');
            background-repeat: repeat;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-bot {
            align-items: flex-start;
        }

        .message-user {
            align-items: flex-end;
        }

        .message-bubble {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 0.9rem;
            position: relative;
        }

        .message-bot .message-bubble {
            background: white;
            color: #111;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-user .message-bubble {
            background: #dcf8c6;
            color: #111;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 0.6rem;
            color: #999;
            margin-top: 3px;
            padding: 0 5px;
        }

        /* Botões de Opção */
        .options-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .option-btn {
            background: #f0f2f5;
            border: 1px solid #075e54;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
            color: #075e54;
        }

        .option-btn:active {
            transform: scale(0.98);
            background: #075e54;
            color: white;
        }

        /* Input Area */
        .chat-input-area {
            background: #f0f2f5;
            padding: 10px 15px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 25px;
            outline: none;
            font-size: 0.9rem;
            background: white;
        }

        .chat-input:focus {
            outline: none;
        }

        .send-btn {
            background: #075e54;
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #075e54;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .chat-container {
                max-width: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-avatar">
                <i class="bi bi-chat-dots-fill"></i>
            </div>
            <div class="header-info">
                <h3>N&G Express</h3>
                <p>Atendimento 24h | Entregas Rápidas</p>
            </div>
            <div class="online-status">
                <i class="bi bi-circle-fill" style="font-size: 8px;"></i> Online
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Digite sua mensagem..." autocomplete="off">
            <button class="send-btn" id="sendBtn">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURAÇÃO DO CHATBOT - VERSÃO CORRIGIDA
        // ============================================================
        
        const ATENDENTES = ['Gabriele', 'Natanael'];
        let chatState = {
            step: 'initial',
            userType: null,
            atendenteAtual: null,
            dadosEntrega: {
                cidadeColeta: '',
                cidadeEntrega: '',
                enderecoColeta: '',
                enderecoEntrega: ''
            },
            motoboy: {
                nome: '',
                regiao: ''
            },
            waitingForResponse: false
        };

        let messageQueue = [];
        let isTyping = false;

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function escolherAtendente() {
            return ATENDENTES[Math.floor(Math.random() * ATENDENTES.length)];
        }

        function addMessage(content, type = 'bot', showTime = true) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            
            const time = getCurrentTime();
            
            messageDiv.innerHTML = `
                <div class="message-bubble">${content}</div>
                ${showTime ? `<div class="message-time">${time}</div>` : ''}
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addOptions(options) {
            const messagesDiv = document.getElementById('chatMessages');
            const lastMessage = messagesDiv.lastElementChild;
            
            if (lastMessage && lastMessage.classList.contains('message-bot')) {
                const optionsContainer = document.createElement('div');
                optionsContainer.className = 'options-container';
                
                options.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = option.text;
                    btn.onclick = () => {
                        addMessage(option.text, 'user');
                        option.action();
                    };
                    optionsContainer.appendChild(btn);
                });
                
                lastMessage.appendChild(optionsContainer);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        function showTyping() {
            if (isTyping) return;
            isTyping = true;
            
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message message-bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
            isTyping = false;
        }

        // Iniciar Chat
        function iniciarChat() {
            chatState.atendenteAtual = escolherAtendente();
            const horaAtual = getCurrentTime();
            
            addMessage(`🎯 Você será atendido(a) por: <strong>${chatState.atendenteAtual}</strong>`, 'bot');
            addMessage(`💬 Chat Iniciado - ${horaAtual}`, 'bot');
            addMessage(`👋 Olá! Seja bem-vindo(a) à N&G Express! 🚚`, 'bot');
            addMessage(`Meu nome é ${chatState.atendenteAtual} e estou aqui para ajudar.`, 'bot');
            
            setTimeout(() => {
                addMessage("Por favor, selecione uma opção:", 'bot');
                addOptions([
                    { text: "📦 Sou Cliente", action: () => fluxoCliente() },
                    { text: "🛵 Sou Motoboy", action: () => fluxoMotoboy() }
                ]);
            }, 500);
        }

        // Fluxo Cliente
        function fluxoCliente() {
            chatState.userType = 'cliente';
            addMessage("Ótimo! Como posso ajudar você?", 'bot');
            addOptions([
                { text: "💬 Falar com Atendente", action: () => falarComAtendente() },
                { text: "🚚 Solicitar Entrega", action: () => solicitarEntrega() }
            ]);
        }

        function falarComAtendente() {
            addMessage("🔍 Aguarde um momento que logo uma atendente irá falar com você...", 'bot');
            
            setTimeout(() => {
                chatState.atendenteAtual = escolherAtendente();
                const horaAtual = getCurrentTime();
                addMessage(`🎯 Você será atendido(a) por: <strong>${chatState.atendenteAtual}</strong>`, 'bot');
                addMessage(`💬 Chat Iniciado - ${horaAtual}`, 'bot');
                addMessage(`Olá! Sou ${chatState.atendenteAtual}, em que posso ajudá-lo(a) hoje?`, 'bot');
                chatState.step = 'aguardando_atendente';
                document.getElementById('chatInput').disabled = false;
                document.getElementById('chatInput').focus();
            }, 2000);
        }

        function solicitarEntrega() {
            addMessage("📦 Vamos solicitar sua entrega!", 'bot');
            setTimeout(() => {
                addMessage("📍 Qual a cidade de coleta?", 'bot');
                chatState.step = 'coleta_cidade';
            }, 500);
        }

        // Fluxo Motoboy
        function fluxoMotoboy() {
            chatState.userType = 'motoboy';
            addMessage("🛵 Para prosseguir, informe seu nome completo:", 'bot');
            chatState.step = 'motoboy_nome';
        }

        // Processar mensagens
        function processMessage(message) {
            const msg = message.trim();
            if (!msg || chatState.waitingForResponse) return;
            
            addMessage(msg, 'user');
            
            switch(chatState.step) {
                case 'coleta_cidade':
                    chatState.dadosEntrega.cidadeColeta = msg;
                    addMessage("📍 Qual é a cidade de entrega?", 'bot');
                    chatState.step = 'entrega_cidade';
                    break;
                    
                case 'entrega_cidade':
                    chatState.dadosEntrega.cidadeEntrega = msg;
                    addMessage("🏠 Informe o endereço completo de coleta (Rua, Número, Bairro):", 'bot');
                    chatState.step = 'coleta_endereco';
                    break;
                    
                case 'coleta_endereco':
                    chatState.dadosEntrega.enderecoColeta = msg;
                    addMessage("🏠 Informe o endereço completo de entrega (Rua, Número, Bairro):", 'bot');
                    chatState.step = 'entrega_endereco';
                    break;
                    
                case 'entrega_endereco':
                    chatState.dadosEntrega.enderecoEntrega = msg;
                    calcularRota();
                    break;
                    
                case 'motoboy_nome':
                    chatState.motoboy.nome = msg;
                    addMessage("📍 Em qual região você está localizado?", 'bot');
                    chatState.step = 'motoboy_regiao';
                    break;
                    
                case 'motoboy_regiao':
                    chatState.motoboy.regiao = msg;
                    addMessage(`✅ Obrigado, ${chatState.motoboy.nome}!`, 'bot');
                    addMessage("🔍 Aguarde um momento que logo uma atendente irá falar com você...", 'bot');
                    setTimeout(() => {
                        chatState.atendenteAtual = escolherAtendente();
                        const horaAtual = getCurrentTime();
                        addMessage(`🎯 Você será atendido(a) por: <strong>${chatState.atendenteAtual}</strong>`, 'bot');
                        addMessage(`💬 Chat Iniciado - ${horaAtual}`, 'bot');
                        addMessage(`Olá ${chatState.motoboy.nome}! Sou ${chatState.atendenteAtual}, em que posso ajudar?`, 'bot');
                        chatState.step = 'aguardando_atendente';
                    }, 2000);
                    break;
                    
                case 'aguardando_atendente':
                    addMessage("📨 Mensagem enviada. Aguarde retorno...", 'bot');
                    setTimeout(() => {
                        addMessage(`👩‍💼 ${chatState.atendenteAtual}: Recebi sua mensagem! Em breve retorno.`, 'bot');
                    }, 1500);
                    break;
                    
                default:
                    addMessage("Desculpe, não entendi. Por favor, escolha uma opção:", 'bot');
                    if (chatState.userType === 'cliente') {
                        fluxoCliente();
                    } else if (chatState.userType === 'motoboy') {
                        fluxoMotoboy();
                    } else {
                        addOptions([
                            { text: "📦 Sou Cliente", action: () => fluxoCliente() },
                            { text: "🛵 Sou Motoboy", action: () => fluxoMotoboy() }
                        ]);
                    }
            }
        }

        function calcularRota() {
            showTyping();
            
            setTimeout(() => {
                hideTyping();
                
                const distancia = (Math.random() * 45 + 5).toFixed(1);
                const tempo = Math.floor(distancia * 2);
                const valor = (distancia * 2.8 + 8).toFixed(2);
                
                addMessage(`✅ *ROTA CALCULADA*\n\n📏 Distância: ${distancia} km\n⏱️ Tempo: ${tempo} min\n💰 Valor: R$ ${valor}\n\n📍 Coleta: ${chatState.dadosEntrega.cidadeColeta}\n📍 Entrega: ${chatState.dadosEntrega.cidadeEntrega}`, 'bot');
                
                addOptions([
                    { text: "✅ Confirmar", action: () => confirmarEntrega() },
                    { text: "❌ Cancelar", action: () => cancelarEntrega() }
                ]);
                
                chatState.step = 'confirmacao';
            }, 1500);
        }

        function confirmarEntrega() {
            addMessage("✅ Entrega confirmada! Pedido registrado.", 'bot');
            addMessage("📱 Você receberá o código de rastreio via WhatsApp.", 'bot');
            addMessage("💚 Agradecemos pela preferência!", 'bot');
            
            setTimeout(() => {
                reiniciarChat();
            }, 3000);
        }

        function cancelarEntrega() {
            addMessage("❌ Entrega cancelada.", 'bot');
            const pixCode = "00020126360014br.gov.bcb.pix011147999123260520400005303986540510.005802BR5913N&G Express6008Cidade62070503***6304E2F3";
            addMessage(`💳 PIX para pagamento:\n\n\`${pixCode}\``, 'bot');
            addMessage("💡 Após pagamento, agendaremos sua entrega.", 'bot');
            
            setTimeout(() => {
                reiniciarChat();
            }, 5000);
        }

        function reiniciarChat() {
            document.getElementById('chatMessages').innerHTML = '';
            chatState = {
                step: 'initial',
                userType: null,
                atendenteAtual: null,
                dadosEntrega: {
                    cidadeColeta: '',
                    cidadeEntrega: '',
                    enderecoColeta: '',
                    enderecoEntrega: ''
                },
                motoboy: {
                    nome: '',
                    regiao: ''
                },
                waitingForResponse: false
            };
            iniciarChat();
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            iniciarChat();
            
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            
            function sendMessage() {
                const msg = input.value.trim();
                if (msg) {
                    processMessage(msg);
                    input.value = '';
                }
            }
            
            sendBtn.addEventListener('click', sendMessage);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        });
    </script>
    <script src="chatbot-integration.js"></script>
    <script src="chatbot.js"></script>
</body>
</html>
